<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Machine Collection Tracker</title>

<style>
    * {
        box-sizing: border-box;
    }

    body {
        font-family: Arial, sans-serif;
        margin: 0;
        padding: 20px;
        background: #f5f5f5;
    }

    .container {
        max-width: 1400px;
        margin: auto;
    }

    h1 {
        text-align: center;
        margin-bottom: 20px;
    }

    .top-section {
        display: flex;
        gap: 10px;
        align-items: center;
        flex-wrap: wrap;
        margin-bottom: 20px;
    }

    label {
        font-weight: bold;
    }

    input[type="date"] {
        padding: 8px;
    }

    button {
        padding: 10px 15px;
        border: none;
        cursor: pointer;
        border-radius: 4px;
    }

    .add-btn {
        background: #28a745;
        color: white;
    }

    .download-btn {
        background: #007bff;
        color: white;
    }

    .delete-btn {
        background: #dc3545;
        color: white;
    }

    table {
        width: 100%;
        border-collapse: collapse;
        background: white;
    }

    th,
    td {
        border: 1px solid #ddd;
        padding: 8px;
        text-align: center;
    }

    th {
        background: #efefef;
    }

    input[type="number"],
    input[type="text"] {
        width: 100%;
        padding: 6px;
    }

    .total-section {
        margin-top: 20px;
        background: white;
        padding: 15px;
        font-size: 22px;
        font-weight: bold;
        text-align: right;
    }

    @media (max-width: 900px) {
        table {
            display: block;
            overflow-x: auto;
        }
    }
</style>
</head>

<body>

<div class="container">

    <h1>Machine Collection Tracker</h1>

    <div class="top-section">
        <label for="reportDate">Date:</label>
        <input type="date" id="reportDate">

        <button class="add-btn" onclick="addMachine()">
            Add Machine
        </button>

        <button class="download-btn" onclick="downloadCSV()">
            Download Report
        </button>
    </div>

    <table id="machineTable">
        <thead>
            <tr>
                <th>Machine</th>
                <th>Old Start</th>
                <th>Old End</th>
                <th>New Start</th>
                <th>New End</th>
                <th>Current Start</th>
                <th>Current End</th>
                <th>Collection</th>
                <th>Action</th>
            </tr>
        </thead>

        <tbody id="machineBody"></tbody>
    </table>

    <div class="total-section">
        Total Collection:
        <span id="grandTotal"></span>
    </div>

</div>

<script>
    let machineCounter = 0;

    document.getElementById("reportDate").value =
        new Date().toISOString().split("T")[0];

    function addMachine() {

        machineCounter++;

        const tbody = document.getElementById("machineBody");

        const row = document.createElement("tr");

        row.innerHTML = `
            <td>
                <input
                    type="text"
                    class="machine-name"
                    value="Machine ${machineCounter}">
            </td>

            <td>
                <input
                    type="number"
                    class="old-start calc"
                    value="0">
            </td>

            <td>
                <input
                    type="number"
                    class="old-end calc"
                    value="0">
            </td>

            <td>
                <input
                    type="number"
                    class="new-start calc"
                    value="0">
            </td>

            <td>
                <input
                    type="number"
                    class="new-end calc"
                    value="0">
            </td>

            <td class="current-start"></td>

            <td class="current-end"></td>

            <td class="collection"></td>

            <td>
                <button
                    class="delete-btn"
                    onclick="removeMachine(this)">
                    Delete
                </button>
            </td>
        `;

        tbody.appendChild(row);

        row.querySelectorAll(".calc").forEach(input => {
            input.addEventListener("input", calculateAll);
        });

        calculateAll();
    }

    function removeMachine(button) {
        button.closest("tr").remove();
        calculateAll();
    }

    function calculateAll() {

        let totalCollection = 0;

        document
            .querySelectorAll("#machineBody tr")
            .forEach(row => {

                const oldStart =
                    Number(
                        row.querySelector(".old-start").value
                    ) || 0;

                const oldEnd =
                    Number(
                        row.querySelector(".old-end").value
                    ) || 0;

                const newStart =
                    Number(
                        row.querySelector(".new-start").value
                    ) || 0;

                const newEnd =
                    Number(
                        row.querySelector(".new-end").value
                    ) || 0;

                const currentStart =
                    newStart - oldStart;

                const currentEnd =
                    newEnd - oldEnd;

                const collection =
                    - currentEnd + currentStart;

                row.querySelector(".current-start")
                    .textContent = currentStart;

                row.querySelector(".current-end")
                    .textContent = currentEnd;

                row.querySelector(".collection")
                    .textContent = collection;

                totalCollection += collection;
            });

        document.getElementById("grandTotal")
            .textContent = totalCollection;
    }

    function escapeCSV(value) {
        return `"${String(value).replace(/"/g, '""')}"`;
    }

    function downloadCSV() {

        const reportDate =
            document.getElementById("reportDate").value;

        let rows = [];

        rows.push([
            "Date",
            reportDate
        ]);

        rows.push([]);

        rows.push([
            "Machine",
            "Old Start",
            "Old End",
            "New Start",
            "New End",
            "Current Start",
            "Current End",
            "Collection"
        ]);

        document
            .querySelectorAll("#machineBody tr")
            .forEach(row => {

                rows.push([
                    row.querySelector(".machine-name").value,
                    row.querySelector(".old-start").value,
                    row.querySelector(".old-end").value,
                    row.querySelector(".new-start").value,
                    row.querySelector(".new-end").value,
                    row.querySelector(".current-start").textContent,
                    row.querySelector(".current-end").textContent,
                    row.querySelector(".collection").textContent
                ]);
            });

        rows.push([]);

        rows.push([
            "",
            "",
            "",
            "",
            "",
            "",
            "Grand Total",
            document.getElementById("grandTotal").textContent
        ]);

        const csvContent = rows
            .map(row =>
                row.map(escapeCSV).join(",")
            )
            .join("\n");

        const blob = new Blob(
            [csvContent],
            {
                type: "text/csv;charset=utf-8;"
            }
        );

        const url =
            URL.createObjectURL(blob);

        const link =
            document.createElement("a");

        link.href = url;

        link.download =
            `Machine_Collection_Report_${reportDate}.csv`;

        document.body.appendChild(link);

        link.click();

        document.body.removeChild(link);

        URL.revokeObjectURL(url);
    }

    addMachine();
</script>

</body>
</html>
